<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGX Valuation Workbench</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link-active { @apply bg-slate-800 text-white border-l-4 border-indigo-500; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex">

    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex-shrink-0 hidden md:flex flex-col">
        <div class="p-6 border-b border-slate-800">
            <h2 class="text-xl font-bold text-white tracking-tighter">NGX_VALUATION</h2>
            <p class="text-xs text-slate-500 uppercase mt-1">Professional Terminal</p>
        </div>

        <nav class="flex-1 mt-6 px-4 space-y-2">
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest px-2 mb-2">Analysis Layers</p>

            <a href="{% url 'quick_scan' %}" class="flex items-center p-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition group">
                <span class="mr-3 text-lg group-hover:scale-110 transition">⚡</span>
                <span class="text-sm font-medium">Layer 1: Quick Scan</span>
            </a>

            <div class="opacity-50 cursor-not-allowed flex items-center p-3 text-slate-400 border border-transparent">
                <span class="mr-3 text-lg">📈</span>
                <span class="text-sm font-medium">Layer 2: Momentum (Locked)</span>
            </div>

            <div class="opacity-50 cursor-not-allowed flex items-center p-3 text-slate-400 border border-transparent">
                <span class="mr-3 text-lg">🛡️</span>
                <span class="text-sm font-medium">Layer 3: Moat Finder (Locked)</span>
            </div>
        </nav>

        <div class="p-4 border-t border-slate-800">
            <div class="bg-slate-950 p-3 rounded-lg border border-slate-800">
                <p class="text-[10px] text-slate-500 uppercase">System Status</p>
                <p class="text-xs text-emerald-500 font-mono">● Gemini 3 Flash Connected</p>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <header class="md:hidden bg-slate-900 p-4 border-b border-slate-800 flex justify-between items-center">
            <h1 class="font-bold text-white">NGX_VALUATION</h1>
            <button class="text-slate-400">Menu</button>
        </header>

        <div class="flex-1 overflow-y-auto">
            {% block content %}
            {% endblock %}
        </div>
    </main>

</body>
</html>
